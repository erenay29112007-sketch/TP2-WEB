<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP6 - Jeu du Mémory</title>
    <style>
        /* ÉTAPE 3 : Configuration globale de la page */
        html, body {
            width: 100%;
            height: 100%;
            min-width: 600px;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* LA GRILLE (5 images par ligne) */
        .grille {
            display: flex;
            flex-wrap: wrap; 
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #ccc;
        }

        /* ÉTAPE 3 & 4 : LES CASES */
        .case {
            width: 20%; 
            aspect-ratio: 1 / 1; 
            background-color: #b0b0ff; /* Bleu par défaut */
            border: 1px solid blue;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .case:hover {
            background-color: #8a8aff;
        }

        /* MODIFICATION ICI : Quand on clique, on enlève la couleur bleue du fond de la case */
        .case:active {
            background-color: white; 
        }

        /* ÉTAPE 2 & 3 : LES IMAGES */
        img {
            width: 100%;         
            height: 100%;        
            object-fit: cover;   
            
            border: solid 1px black; 
            box-sizing: border-box;
            
            /* ÉTAPE 4 : Cacher l'image par défaut */
            opacity: 0; 
            transition: opacity 0.1s;
        }

        /* Affichage de l'image au clic */
        .case:active img {
            opacity: 1;
        }
    </style>
</head>
<body>²²
